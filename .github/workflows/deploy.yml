name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-vercel:
    name: Vercel
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          bunx vercel pull --yes --token=$VERCEL_TOKEN
          bunx vercel build --prod --token=$VERCEL_TOKEN
          bunx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

  deploy-docker:
    name: Docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t cloud-commerce:latest .
      - name: Save image
        run: docker save cloud-commerce:latest | gzip > cloud-commerce.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: cloud-commerce.tar.gz
